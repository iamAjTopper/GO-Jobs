apiVersion: apps/v1
kind: Deployment

metadata:
  name: api
  namespace: go-jobs

spec:
  replicas: 1

  selector:
    matchLabels:
      app: api

  template:
    metadata:
      labels:
        app: api

    spec:
      containers:
      - name: api

        image: go-jobs-main-api:latest
        imagePullPolicy: Never

        ports:
        - containerPort: 8080

        env:
        - name: DB_DSN
          value: "host=postgres-service user=postgres password=ankush123 dbname=go_jobs_db port=5432 sslmode=disable"

        - name: REDIS_ADDR
          value: "redis-service:6379"