apiVersion: v1
kind: ConfigMap

metadata:
  name: prometheus-config
  namespace: go-jobs

data:
  prometheus.yml: |
    global:
      scrape_interval: 5s

    scrape_configs:
      - job_name: "go-jobs"

        static_configs:
          - targets:
              - api-service:8080
              - worker-service:2112